# Archived post-MVP reference only.
# Azure Container Apps is the authorised V2 deployment target.
# Do not use this manifest for active deployment without a new architecture decision record.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduboost-api
  labels: { app: eduboost-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: eduboost-api }
  template:
    metadata:
      labels: { app: eduboost-api }
    spec:
      containers:
        - name: api
          image: eduboost/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef: { name: eduboost-secrets }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 15
          resources:
            requests: { memory: "256Mi", cpu: "250m" }
            limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: eduboost-api-svc
spec:
  selector: { app: eduboost-api }
  ports:
    - port: 80
      targetPort: 8000
