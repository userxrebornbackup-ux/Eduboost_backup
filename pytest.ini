# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini
#
# Supported V2 tests are the default pytest suite. Archived legacy-runtime
# tests live under ``tests/legacy`` and are intentionally excluded from the
# active gate now that V2 is the sole supported runtime.
# ─────────────────────────────────────────────────────────────────────────────

[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs = .* build dist CVS _darcs {arch} *.egg .venv venv node_modules .hypothesis .pytest_cache tests/legacy
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Coverage ──────────────────────────────────────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit: fast, isolated unit tests (no I/O)
    integration: tests that require a live DB or Redis
    e2e: end-to-end tests via Playwright (require running stack)
    slow: tests that take >5 seconds
    llm: tests that make real LLM API calls (skipped in CI unless ALLOW_LLM_TESTS=1)
    performance: performance/SLO checks that may require a seeded database or running stack

# ── Warnings ──────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ── Default markers to exclude in standard CI run ─────────────────────────────
# Run with: pytest -m "not llm and not e2e"
# Full run:  pytest   (includes all markers)
