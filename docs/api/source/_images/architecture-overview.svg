<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="480" fill="#F8FAFD" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F3864">EduBoost SA — V2 Architecture Overview</text>

  <!-- Client Layer -->
  <rect x="30" y="60" width="800" height="64" rx="8" fill="#EEF4FB" stroke="#2E5FA3" stroke-width="1.5"/>
  <text x="430" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F3864">Client Layer</text>
  <rect x="60" y="78" width="150" height="36" rx="6" fill="#2E5FA3"/>
  <text x="135" y="101" text-anchor="middle" font-size="11" fill="white">Next.js 14 PWA</text>
  <rect x="230" y="78" width="150" height="36" rx="6" fill="#2E5FA3"/>
  <text x="305" y="101" text-anchor="middle" font-size="11" fill="white">Parent Portal</text>
  <rect x="400" y="78" width="150" height="36" rx="6" fill="#2E5FA3"/>
  <text x="475" y="101" text-anchor="middle" font-size="11" fill="white">Teacher Dashboard</text>

  <!-- Arrow -->
  <line x1="430" y1="124" x2="430" y2="148" stroke="#2E5FA3" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E5FA3"/>
    </marker>
  </defs>

  <!-- Azure Front Door -->
  <rect x="310" y="148" width="240" height="32" rx="6" fill="#D5E8F0" stroke="#2E5FA3" stroke-width="1"/>
  <text x="430" y="169" text-anchor="middle" font-size="11" fill="#1F3864">☁ Azure Front Door (CDN / WAF / SSL)</text>

  <!-- Arrow -->
  <line x1="430" y1="180" x2="430" y2="200" stroke="#2E5FA3" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FastAPI Monolith -->
  <rect x="30" y="200" width="800" height="150" rx="8" fill="#fff" stroke="#1F3864" stroke-width="2"/>
  <text x="430" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F3864">FastAPI Modular Monolith (Azure Container Apps)</text>

  <!-- Core kernel -->
  <rect x="50" y="232" width="200" height="104" rx="6" fill="#EEF4FB" stroke="#2E5FA3" stroke-width="1"/>
  <text x="150" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F3864">Core Kernel</text>
  <text x="150" y="267" text-anchor="middle" font-size="10" fill="#444">config · database</text>
  <text x="150" y="282" text-anchor="middle" font-size="10" fill="#444">security · audit</text>
  <text x="150" y="297" text-anchor="middle" font-size="10" fill="#444">metrics · middleware</text>
  <text x="150" y="312" text-anchor="middle" font-size="10" fill="#444">dependencies (POPIA gate)</text>

  <!-- Domain modules -->
  <rect x="270" y="232" width="340" height="104" rx="6" fill="#EEF4FB" stroke="#2E5FA3" stroke-width="1"/>
  <text x="440" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F3864">Domain Modules</text>
  <rect x="280" y="256" width="88" height="26" rx="4" fill="#2E5FA3"/>
  <text x="324" y="273" text-anchor="middle" font-size="9" fill="white">diagnostics</text>
  <rect x="376" y="256" width="88" height="26" rx="4" fill="#2E5FA3"/>
  <text x="420" y="273" text-anchor="middle" font-size="9" fill="white">llm_gateway</text>
  <rect x="472" y="256" width="88" height="26" rx="4" fill="#2E5FA3"/>
  <text x="516" y="273" text-anchor="middle" font-size="9" fill="white">consent</text>
  <rect x="280" y="292" width="88" height="26" rx="4" fill="#1A7340"/>
  <text x="324" y="309" text-anchor="middle" font-size="9" fill="white">study_plans</text>
  <rect x="376" y="292" width="88" height="26" rx="4" fill="#1A7340"/>
  <text x="420" y="309" text-anchor="middle" font-size="9" fill="white">gamification</text>
  <rect x="472" y="292" width="88" height="26" rx="4" fill="#1A7340"/>
  <text x="516" y="309" text-anchor="middle" font-size="9" fill="white">rlhf</text>

  <!-- Inference sidecar -->
  <rect x="630" y="232" width="180" height="104" rx="6" fill="#FFF3CD" stroke="#7B4F00" stroke-width="1"/>
  <text x="720" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B4F00">Inference Sidecar</text>
  <text x="720" y="268" text-anchor="middle" font-size="10" fill="#444">torch / transformers</text>
  <text x="720" y="284" text-anchor="middle" font-size="10" fill="#444">internal-only network</text>
  <text x="720" y="300" text-anchor="middle" font-size="10" fill="#7B4F00">⚠ not CI-tested yet</text>

  <!-- Data layer -->
  <rect x="30" y="376" width="800" height="82" rx="8" fill="#F5F5F5" stroke="#444" stroke-width="1.5"/>
  <text x="430" y="396" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F3864">Azure Data Layer</text>

  <rect x="50" y="406" width="180" height="40" rx="6" fill="#1F3864"/>
  <text x="140" y="431" text-anchor="middle" font-size="10" fill="white">PostgreSQL Flexible (SA North)</text>

  <rect x="248" y="406" width="140" height="40" rx="6" fill="#1F3864"/>
  <text x="318" y="431" text-anchor="middle" font-size="10" fill="white">Azure Cache for Redis</text>

  <rect x="406" y="406" width="140" height="40" rx="6" fill="#1F3864"/>
  <text x="476" y="431" text-anchor="middle" font-size="10" fill="white">Azure Key Vault</text>

  <rect x="564" y="406" width="140" height="40" rx="6" fill="#1F3864"/>
  <text x="634" y="431" text-anchor="middle" font-size="10" fill="white">Grafana Cloud</text>

  <rect x="712" y="406" width="100" height="40" rx="6" fill="#1F3864"/>
  <text x="762" y="431" text-anchor="middle" font-size="10" fill="white">Stripe</text>

  <!-- Connecting arrows monolith → data -->
  <line x1="430" y1="350" x2="430" y2="376" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="430" y="472" text-anchor="middle" font-size="9" fill="#888">Generated May 2026 · docs/shared/images/architecture-overview.svg</text>
</svg>
