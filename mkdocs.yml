site_name: EduBoost V2
site_description: Architecture, operations, and API documentation for EduBoost SA V2
site_url: https://example.com/eduboost-v2
repo_url: https://github.com/NkgoloL/Eduboost-V2
site_dir: site

theme:
  name: material

nav:
  - Home: index.md
  - Project Status: project_status.md
  - Architecture:
      - Overview: architecture.md
      - V2 Manifest: architecture/V2_ARCHITECTURE.md
      - Migration Guide: v2_migration.md
      - Agent Handoff: v2_handoff.md
  - Operations:
      - Recommended Operating Model: operations/recommended_operating_model.md
      - Project Assistance Status: operations/project_assistance_status.md
      - API Overview: api_v2.md
      - POPIA Compliance: POPIA_COMPLIANCE.md
      - Right to Erasure: popia_erasure.md
      - Azure Migration: Azure_Migration_Guide.md
      - Development: DEVELOPMENT.md
  - API Reference:
      - FastAPI Entrypoint: reference/api_v2.md
      - Routers: reference/api_v2_routers.md
      - Core Runtime: reference/core.md
      - Domain Models: reference/domain.md
      - Repositories: reference/repositories.md
      - Services: reference/services.md
      - Learning Engines: reference/modules.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            paths: ["."]
            show_root_heading: true
            show_source: false
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
