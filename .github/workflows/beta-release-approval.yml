name: Beta Release Approval

on:
  workflow_dispatch:
    inputs:
      release_candidate:
        description: "Release candidate identifier"
        required: true
      target_environment:
        description: "Target environment"
        required: true
        default: "staging"
      rollback_owner:
        description: "Rollback owner"
        required: true
      post_deploy_owner:
        description: "Post-deploy verification owner"
        required: true

jobs:
  beta-release-approval:
    runs-on: ubuntu-latest
    env:
      RELEASE_CANDIDATE: ${{ inputs.release_candidate }}
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      ROLLBACK_OWNER: ${{ inputs.rollback_owner }}
      POST_DEPLOY_OWNER: ${{ inputs.post_deploy_owner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements/dev.txt ]; then pip install -r requirements/dev.txt; fi
      - name: Generate release evidence
        run: |
          make staging-smoke-evidence-manifest
          make beta-signoff-manifest
          make beta-release-evidence-bundle
      - name: Validate approval evidence
        run: |
          make beta-release-readiness-contract-check
          make staging-smoke-evidence-manifest-check
          make beta-signoff-manifest-check
          make beta-release-evidence-bundle-check
          make beta-rollback-runbook-check
          make post-deploy-staging-smoke-checklist-check
          make cluster-h-release-readiness-check
