name: Cluster H Release Readiness

on:
  pull_request:
    branches: [master, "release/**"]
  push:
    branches: [master, "release/**"]

jobs:
  cluster-h-release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements/dev.txt ]; then pip install -r requirements/dev.txt; fi
      - name: Generate staging smoke evidence
        run: make staging-smoke-evidence-manifest
          make beta-signoff-manifest
          make release-candidate-tag-manifest
          make beta-release-evidence-bundle
      - name: Check Cluster H release readiness
        run: |
          make beta-release-readiness-contract-check
          make staging-smoke-evidence-manifest-check
          make beta-signoff-manifest-check
          make beta-rollback-runbook-check
          make post-deploy-staging-smoke-checklist-check
          make beta-release-evidence-bundle-check
          make release-approval-workflow-contract-check
          make release-candidate-tag-manifest-check
          make cluster-h-closure-check
          make release-artifact-retention-contract-check
          make beta-release-final-checklist-check
          make project-release-closure-index-check
          make generated-artifact-hygiene-check
          make branch-sync-rebase-checklist-check
          make pr-closeout-evidence-checklist-check
          make beta-release-execution-plan-check
          make beta-pr-body
          make beta-pr-body-check
          make final-release-verification-check
          make release-state-snapshot
          make release-state-snapshot-check
          make beta-evidence-consistency-check
          make final-pr-merge-readiness-check
          make post-merge-release-handoff-check
          make release-owner-accountability-check
          make beta-release-decision-log-check
          make release-audit-trail-index-check
          make beta-release-closure-attestation-check
          make cluster-h-final-closeout-rollup-check
          make beta-release-freeze-window-check
          make release-change-control-exception-log-check
          make final-beta-operator-packet-check
          make beta-release-communications-plan-check
          make beta-monitoring-incident-trigger-check
          make beta-participant-support-handoff-check
          make beta-feedback-intake-contract-check
          make beta-known-issues-register-check
          make beta-acceptance-exit-criteria-check
          make beta-outcome-report-template-check
          make beta-retrospective-action-register-check
          make post-beta-evidence-archive-manifest-check
          make beta-governance-seal-check
          make beta-release-final-index-check
          make cluster-h-terminal-closure-assertion-check
          make final-release-handoff-package-check
          make evidence-archive-completeness-guard-check
          make post-terminal-audit-readiness-check
          make release-owner-execution-guardrail-check
          make final-project-closeout-attestation-check
          make cluster-h-release-evidence-checksum-index-check
          make final-merge-signoff-lock-check
          make release-owner-post-closeout-decision-record-check
          make final-evidence-noop-execution-assertion-check
          make final-release-evidence-ledger-check
          make frozen-scope-variance-register-check
          make post-closeout-maintenance-boundary-check
          make final-acceptance-packet-index-check
          make release-handoff-freeze-assertion-check
          make post-closeout-evidence-access-policy-check
          make archival-lock-assertion-check
          make pr-ready-final-closure-certificate-check
          make final-release-evidence-toc-check
          make final-reviewer-pack-checklist-check
          make merge-control-evidence-gate-check
          make release-evidence-retention-finalization-check
          make final-release-readiness-rollup-check
          make evidence-freeze-confirmation-record-check
          make pr-merge-evidence-summary-check
          make final-acceptance-memo-check
          make release-record-closure-ledger-check
          make post-merge-evidence-continuity-note-check
          make cluster-h-release-readiness-check
      - name: Run Cluster H release readiness tests
        run: |
          pytest -c pytest.ini \
            tests/unit/test_beta_release_readiness_contract.py \
            tests/unit/test_cluster_h_acceptance_memo_record_closure_continuity_wiring.py \
            tests/unit/test_post_merge_evidence_continuity_note.py \
            tests/unit/test_release_record_closure_ledger.py \
            tests/unit/test_final_acceptance_memo.py \
            tests/unit/test_cluster_h_readiness_rollup_freeze_merge_summary_wiring.py \
            tests/unit/test_pr_merge_evidence_summary.py \
            tests/unit/test_evidence_freeze_confirmation_record.py \
            tests/unit/test_final_release_readiness_rollup.py \
            tests/unit/test_cluster_h_reviewer_pack_merge_control_retention_wiring.py \
            tests/unit/test_release_evidence_retention_finalization.py \
            tests/unit/test_merge_control_evidence_gate.py \
            tests/unit/test_final_reviewer_pack_checklist.py \
            tests/unit/test_cluster_h_archival_lock_pr_ready_toc_wiring.py \
            tests/unit/test_final_release_evidence_toc.py \
            tests/unit/test_pr_ready_final_closure_certificate.py \
            tests/unit/test_archival_lock_assertion.py \
            tests/unit/test_cluster_h_acceptance_packet_handoff_freeze_access_policy_wiring.py \
            tests/unit/test_post_closeout_evidence_access_policy.py \
            tests/unit/test_release_handoff_freeze_assertion.py \
            tests/unit/test_final_acceptance_packet_index.py \
            tests/unit/test_cluster_h_ledger_variance_maintenance_wiring.py \
            tests/unit/test_post_closeout_maintenance_boundary.py \
            tests/unit/test_frozen_scope_variance_register.py \
            tests/unit/test_final_release_evidence_ledger.py \
            tests/unit/test_cluster_h_merge_signoff_post_closeout_noop_wiring.py \
            tests/unit/test_final_evidence_noop_execution_assertion.py \
            tests/unit/test_release_owner_post_closeout_decision_record.py \
            tests/unit/test_final_merge_signoff_lock.py \
            tests/unit/test_cluster_h_execution_guardrail_closeout_checksum_wiring.py \
            tests/unit/test_cluster_h_release_evidence_checksum_index.py \
            tests/unit/test_final_project_closeout_attestation.py \
            tests/unit/test_release_owner_execution_guardrail.py \
            tests/unit/test_cluster_h_post_terminal_handoff_archive_audit_wiring.py \
            tests/unit/test_post_terminal_audit_readiness.py \
            tests/unit/test_evidence_archive_completeness_guard.py \
            tests/unit/test_final_release_handoff_package.py \
            tests/unit/test_cluster_h_governance_seal_terminal_closure_wiring.py \
            tests/unit/test_cluster_h_terminal_closure_assertion.py \
            tests/unit/test_beta_release_final_index.py \
            tests/unit/test_beta_governance_seal.py \
            tests/unit/test_cluster_h_outcome_retrospective_archive_wiring.py \
            tests/unit/test_post_beta_evidence_archive_manifest.py \
            tests/unit/test_beta_retrospective_action_register.py \
            tests/unit/test_beta_outcome_report_template.py \
            tests/unit/test_cluster_h_feedback_issues_acceptance_wiring.py \
            tests/unit/test_beta_acceptance_exit_criteria.py \
            tests/unit/test_beta_known_issues_register.py \
            tests/unit/test_beta_feedback_intake_contract.py \
            tests/unit/test_cluster_h_communications_monitoring_support_wiring.py \
            tests/unit/test_beta_participant_support_handoff.py \
