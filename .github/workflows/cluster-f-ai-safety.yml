name: Cluster F AI Safety Evidence

on:
  pull_request:
    branches: [master, "release/**"]
  push:
    branches: [master, "release/**"]

jobs:
  cluster-f-ai-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Cluster F evidence checks
        run: |
          make caps-alignment-contract-check
          make ai-safety-boundary-check
          make diagnostic-generation-safety-check
          make ai-output-schema-contract-check
          make llm-provider-fallback-contract-check
          make ai-prompt-input-contract-check
          make cluster-f-ai-safety-check
          pytest -c pytest.ini \
            tests/unit/test_caps_alignment_contract.py \
            tests/unit/test_ai_output_schema_contract.py \
            tests/unit/test_llm_provider_fallback_contract.py \
            tests/unit/test_diagnostic_generation_safety_contract.py \
            tests/unit/test_ai_prompt_input_contract.py \
            tests/unit/test_ai_safety_boundary_contract.py \
            -q --no-cov
