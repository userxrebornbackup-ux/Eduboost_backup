name: Privacy Boundary

on:
  pull_request:
    branches:
      - master
      - main
      - "release/**"
    paths:
      - "app/**"
      - "docs/security/**"
      - "docs/compliance/**"
      - "scripts/check_privacy_boundary_evidence.py"
      - "tests/unit/test_privacy_boundary_evidence.py"
      - "Makefile"
      - ".github/workflows/privacy-boundary.yml"
  push:
    branches:
      - master
      - main
      - "release/**"
    paths:
      - "app/**"
      - "docs/security/**"
      - "docs/compliance/**"
      - "scripts/check_privacy_boundary_evidence.py"
      - "tests/unit/test_privacy_boundary_evidence.py"
      - "Makefile"
      - ".github/workflows/privacy-boundary.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy-boundary-check:
    name: Check privacy boundary evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi

      - name: Run privacy boundary evidence tests
        run: pytest tests/unit/test_privacy_boundary_evidence.py -q --no-cov

      - name: Run aggregate privacy boundary check
        run: make privacy-boundary-check
