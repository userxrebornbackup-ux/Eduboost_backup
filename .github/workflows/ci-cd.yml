name: EduBoost CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "60"
  V2_ENTRYPOINT: "app.api_v2:app"

jobs:
  # -------------------------------------------------------------------------
  # LINT & TYPE CHECK
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements/dev.txt types-redis types-boto3 pydantic pydantic-settings

      - name: Run ruff
        run: ruff check app/ tests/ --output-format=github --select E9,F63,F7,F82

      - name: Run mypy
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports --strict-optional

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt -r requirements/ml.txt

      - name: Run Bandit SAST
        run: |
          pip install bandit
          bandit -r app/ -ll -ii --exclude app/tests -f json -o bandit-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Enforce DDD import boundaries
        run: lint-imports

      - name: Lint Markdown
        continue-on-error: true
        run: |
          pip install pymarkdownlnt
          pymarkdown scan docs/ audits/ README.md SECURITY.md CONTRIBUTING.md

  # -------------------------------------------------------------------------
  # DOCUMENTATION QUALITY
  # -------------------------------------------------------------------------
  docs-quality:
    name: Markdown & Link Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Lint Markdown
        continue-on-error: true
        run: |
          pip install pymarkdownlnt
          pymarkdown scan README.md SECURITY.md CONTRIBUTING.md docs/ audits/

      - name: Check Markdown links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,429
            --exclude-loopback
            --exclude-mail
            'README.md'
            'SECURITY.md'
            'CONTRIBUTING.md'
            'docs/**/*.md'
            'audits/**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # DOCUMENTATION BUILD
  # -------------------------------------------------------------------------
  docs:
    name: Build API Docs (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements/dev.txt
          pip install -r docs/api/requirements.txt

      - name: Build HTML documentation
        run: |
          # Build docs, treat warnings as errors to ensure documentation quality
          sphinx-build -W -b html docs/api/source docs/api/_build/html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: docs/api/_build/html/

  # -------------------------------------------------------------------------
  # UNIT TESTS
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run unit tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # INTEGRATION TESTS (with service containers)
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eduboost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eduboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      ENVIRONMENT: test
      APP_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      JWT_SECRET: test-jwt-secret-32-chars-minimum-value
      JWT_SECRET_KEY: test-jwt-secret-32-chars-minimum-value
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      ENCRYPTION_SALT: test-encryption-salt
      AUDIT_DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      REDIS_URL: redis://localhost:6379/0
      JUDICIARY_API_KEY: test-judiciary-key
      JUDICIARY_SERVICE_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            --no-cov \
            --timeout=60

  v2-smoke:
    name: V2 API Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eduboost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eduboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      APP_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET: test-jwt-secret-32-chars-minimum-value
      JWT_SECRET_KEY: test-jwt-secret-32-chars-minimum-value
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Smoke-import app.api_v2
        run: python -c "from app.api_v2 import app; print(app.title)"
      - name: Runtime entrypoint check
        run: python scripts/check_runtime_entrypoints.py
      - name: Import V2 repositories
        run: python -c "import importlib; [importlib.import_module(m) for m in ['app.repositories.diagnostic_repository','app.repositories.lesson_repository','app.repositories.gamification_repository','app.repositories.assessment_repository']]"

      - name: V2 module coverage
        run: |
          pytest tests/unit/ \
            --cov=app.api_v2 \
            --cov=app.repositories \
            --cov=app.services \
            --cov=app.domain \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v --tb=short

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=optional --legacy-peer-deps

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run frontend coverage gate
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/frontend/coverage/

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

  # -------------------------------------------------------------------------
  # E2E TESTS (Playwright)
  # -------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    needs: [integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # -------------------------------------------------------------------------
  # SCHEMA DRIFT GATE (alembic check)
  # -------------------------------------------------------------------------
  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eduboost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eduboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      APP_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET: schema-ci-test-secret-32chars-min
      JWT_SECRET_KEY: schema-ci-test-secret-32chars-min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Bootstrap schema
        run: alembic upgrade head

      - name: Assert no pending migrations (drift check)
        run: alembic check

  # -------------------------------------------------------------------------
  # CONTENT FACTORY MIGRATION GATE
  # -------------------------------------------------------------------------
  content-factory-migrations:
    name: Content Factory Migration Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eduboost
          POSTGRES_PASSWORD: eduboost
          POSTGRES_DB: eduboost_content_factory_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://eduboost:eduboost@localhost:55432/eduboost_content_factory_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      APP_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET: test-jwt-secret-32-chars-minimum-value
      JWT_SECRET_KEY: test-jwt-secret-32-chars-minimum-value

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Wait for database readiness
        run: python scripts/wait_for_db.py --timeout 60 --interval 2

      - name: Run Content Factory migration gate
        run: |
          chmod +x scripts/ci/check_content_factory_migrations.sh
          bash scripts/ci/check_content_factory_migrations.sh

  # -------------------------------------------------------------------------
  # CONTENT FACTORY UNIT TESTS (static — no DB required)
  # -------------------------------------------------------------------------
  content-factory-unit-tests:
    name: Content Factory Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run Content Factory static unit tests
        run: |
          pytest \
            tests/unit/test_content_factory_route_security.py \
            tests/unit/test_content_factory_enums.py \
            tests/unit/test_content_factory_table_reconciliation.py \
            -v --tb=short --no-cov

  # -------------------------------------------------------------------------
  # POPIA COMPLIANCE TESTS
  # -------------------------------------------------------------------------
  popia-tests:
    name: POPIA Compliance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run POPIA compliance tests
        run: |
          pytest tests/popia/ -v --tb=short --no-cov -k "pii or consent or erasure"

      - name: Run POPIA prompt sweep
        run: python scripts/popia_sweep.py --fail-on-issues

  # -------------------------------------------------------------------------
  # DOCKER IMAGE SCANNING
  # -------------------------------------------------------------------------
  image-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.v2
          target: production
          tags: eduboost-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "eduboost-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # -------------------------------------------------------------------------
  # SECRETS SCANNING
  # -------------------------------------------------------------------------
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # PRODUCTION PROMOTION GATE (tag-triggered)
  # -------------------------------------------------------------------------
  production-promote:
    name: Production Promotion Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [lint, unit-tests, integration-tests, frontend, schema-drift, content-factory-migrations, content-factory-unit-tests, popia-tests, image-scan, secrets-scan, e2e]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests against staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          pytest tests/smoke/ -v --tb=short \
            --base-url="$STAGING_URL" \
            --api-key="$STAGING_API_KEY" \
            --timeout=30

      - name: Deploy to production (k8s)
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/eduboost-api \
            api=ghcr.io/nkgoloL/eduboost-api:${{ github.ref_name }}
          kubectl rollout status deployment/eduboost-api --timeout=5m

      - name: Verify production health
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          curl -f "$PROD_URL/health" || exit 1
          curl -f "$PROD_URL/judiciary/health" || exit 1
