# .github/workflows/legacy-route-guard.yml
# ─────────────────────────────────────────
# Ensures that no legacy/V1 routes are accidentally exposed by app.api_v2:app.
# Runs the route-contract unit tests that cover legacy exclusion.

name: legacy-route-guard

on:
  push:
    branches: [master, main]
    paths:
      - "app/**"
  pull_request:
    paths:
      - "app/**"

jobs:
  legacy-route-guard:
    name: Legacy route exclusion guard
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      ENVIRONMENT: test
      DATABASE_URL: sqlite+aiosqlite:///./eduboost_test.db
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET: legacy-route-ci-test-secret-32chars
      JWT_SECRET_KEY: legacy-route-ci-test-secret-32chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run legacy-route-guard tests
        run: |
          pytest \
            tests/unit/test_api_v2_router_contract.py \
            tests/test_entrypoints.py \
            -v \
            -k "legacy" \
            --no-cov \
            --tb=short

      - name: Run runtime entrypoint check
        run: python3 scripts/check_runtime_entrypoints.py
