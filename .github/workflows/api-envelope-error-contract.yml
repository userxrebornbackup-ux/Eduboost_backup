name: API Envelope Error Contract

on:
  pull_request:
    branches:
      - master
      - main
      - "release/**"
    paths:
      - "app/domain/api_v2_models.py"
      - "app/core/exceptions.py"
      - "docs/error_contract.md"
      - "docs/api_envelope_contract.md"
      - "scripts/check_api_envelope_error_contract.py"
      - "tests/unit/test_api_v2_envelope.py"
      - "tests/unit/test_exception_envelopes.py"
      - "tests/unit/test_api_envelope_error_contract.py"
      - "Makefile"
      - ".github/workflows/api-envelope-error-contract.yml"
  push:
    branches:
      - master
      - main
      - "release/**"
    paths:
      - "app/domain/api_v2_models.py"
      - "app/core/exceptions.py"
      - "docs/error_contract.md"
      - "docs/api_envelope_contract.md"
      - "scripts/check_api_envelope_error_contract.py"
      - "tests/unit/test_api_v2_envelope.py"
      - "tests/unit/test_exception_envelopes.py"
      - "tests/unit/test_api_envelope_error_contract.py"
      - "Makefile"
      - ".github/workflows/api-envelope-error-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-envelope-error-contract-check:
    name: Check API envelope/error contract
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi

      - name: Run API envelope/error tests
        run: |
          pytest \
            tests/unit/test_api_v2_envelope.py \
            tests/unit/test_exception_envelopes.py \
            tests/unit/test_api_envelope_error_contract.py \
            -q --no-cov

      - name: Run aggregate API envelope/error check
        run: make api-envelope-error-contract-check
