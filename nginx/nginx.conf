events { worker_connections 1024; }
http {
  upstream api { server api:8000; }
  upstream frontend { server frontend:3050; }
  server {
    listen 80;
    listen 443 ssl;
    server_name _;
    # Placeholder cert paths for production runtime checks (uses LetsEncrypt default path)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;
    location /health { return 200 'ok'; add_header Content-Type text/plain; }
    location /api/ { proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
  }
}
